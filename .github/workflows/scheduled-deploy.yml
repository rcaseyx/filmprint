name: Scheduled deploy

on:
  schedule:
    - cron: '0 6 * * *' # 2am ET (UTC-4 in summer, UTC-5 in winter — adjust as needed)
  workflow_dispatch:     # manual trigger as escape hatch

jobs:
  test-api:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test-api
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 544b18f1-b3ef-4c9f-8ef6-440519f795cf
        run: railway up --service filmprint-backend --detach

      - name: Deploy frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 544b18f1-b3ef-4c9f-8ef6-440519f795cf
        run: railway up --service filmprint-app --detach

      - name: Wait for backend deployment to complete
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          PROJECT_ID="544b18f1-b3ef-4c9f-8ef6-440519f795cf"
          SERVICE_ID="0783e4d0-de52-4dc2-8b3b-d25ecefed666"
          ENVIRONMENT_ID="7b3610d5-7618-4604-8ce8-be1fecbd4a52"
          QUERY='{"query":"query{deployments(input:{projectId:\"'$PROJECT_ID'\",serviceId:\"'$SERVICE_ID'\",environmentId:\"'$ENVIRONMENT_ID'\"}){edges{node{status}}}}"}'

          echo "Polling backend deployment status..."
          sleep 15
          NULL_COUNT=0
          for i in $(seq 1 40); do
            STATUS=$(curl -sf -X POST \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$QUERY" \
              https://backboard.railway.app/graphql/v2 \
              | jq -r '[.data.deployments.edges[].node.status] | map(select(. != null and . != "REMOVED")) | last // "null"' 2>/dev/null || echo "UNKNOWN")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "SKIPPED" ]; then
              echo "Backend deployment succeeded (status: $STATUS)."
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              echo "Backend deployment failed with status: $STATUS"
              exit 1
            fi
            # If GraphQL keeps returning null, fall back to health check after 5 minutes
            if [ "$STATUS" = "null" ] || [ "$STATUS" = "UNKNOWN" ]; then
              NULL_COUNT=$((NULL_COUNT + 1))
              if [ "$NULL_COUNT" -ge 10 ]; then
                echo "GraphQL status unclear after 5 min, falling back to health check..."
                HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://filmprint-backend-production.up.railway.app/health)
                if [ "$HEALTH" = "200" ]; then
                  echo "Service healthy (HTTP 200), treating as success."
                  exit 0
                fi
                echo "Health check returned $HEALTH, continuing to poll..."
                NULL_COUNT=0
              fi
            else
              NULL_COUNT=0
            fi
            sleep 30
          done
          echo "Backend deployment timed out after 20 minutes"
          exit 1

  post-deploy-monitor:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Wait for Railway to finish routing
        run: sleep 30

      - name: Health check (retry for up to 3 min)
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://filmprint-backend-production.up.railway.app/health)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 30
          done
          echo "Health check failed after retries"
          exit 1

      - name: Rollback backend on failure
        if: failure()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway rollback --service filmprint-backend

      - name: Rollback frontend on failure
        if: failure()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway rollback --service filmprint-app
